services:
  db:
    image: postgres:16-alpine
    container_name: construction-work-journal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: work_journal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d work_journal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
